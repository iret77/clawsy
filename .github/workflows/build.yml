name: Build Clawsy Ecosystem

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS Ecosystem
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    # Inject Version if Tagged
    - name: Set Version from Tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/v}
        echo "Setting version to $TAG_NAME"

        # Update Info.plist for ClawsyMac
        /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG_NAME" Info.plist
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" Info.plist

        # Update Info.plist for extensions
        for plist in Sources/ClawsyMacShare/Info.plist Sources/ClawsyFinderSync/Info.plist; do
          if [ -f "$plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG_NAME" "$plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" "$plist"
          fi
        done

    - name: Build and Package
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Zip App
      run: |
        cp CLAWSY.md .build/app/CLAWSY.md
        cd .build/app
        zip -r ../../Clawsy.app.zip Clawsy.app CLAWSY.md

    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: Clawsy-Ecosystem
        path: Clawsy.app.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Clawsy.app.zip
        generate_release_notes: true
        draft: false
        prerelease: false
