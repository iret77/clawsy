name: Build Clawsy

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    # Inject Version if Tagged
    - name: Set Version from Tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/v}
        echo "Setting version to $TAG_NAME"

        # Update Info.plist for ClawsyMac
        /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG_NAME" Info.plist
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" Info.plist

        # Update Info.plist for extensions
        for plist in Sources/ClawsyMacShare/Info.plist Sources/ClawsyFinderSync/Info.plist; do
          if [ -f "$plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG_NAME" "$plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" "$plist"
          fi
        done

    - name: Import Apple Developer Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
      run: |
        KEYCHAIN="build.keychain"
        KEYCHAIN_PW="$(openssl rand -hex 16)"

        # Decode the p12 certificate from the GitHub secret
        echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12

        # Create a temporary build keychain
        security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
        security default-keychain -s "$KEYCHAIN"
        security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
        security set-keychain-settings -t 3600 "$KEYCHAIN"

        # Import the Apple Developer ID Application certificate
        security import /tmp/certificate.p12 -k "$KEYCHAIN" \
          -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security

        # Allow codesign to access the keychain without UI prompt
        security set-key-partition-list -S apple-tool:,apple: \
          -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

        # Add to search list so codesign can find it
        security list-keychains -s "$KEYCHAIN" $(security list-keychains | tr -d '"')

        # Verify the identity is available
        security find-identity -v -p codesigning "$KEYCHAIN"

        # Cleanup
        rm -f /tmp/certificate.p12

    - name: Install Provisioning Profiles
      env:
        PROFILE_HOST_BASE64: ${{ secrets.PROFILE_HOST_BASE64 }}
        PROFILE_SHARE_BASE64: ${{ secrets.PROFILE_SHARE_BASE64 }}
        PROFILE_FINDERSYNC_BASE64: ${{ secrets.PROFILE_FINDERSYNC_BASE64 }}
      run: |
        # xcodebuild looks up profiles by UUID in this directory. Each file's
        # UUID is read from its plist payload and used as the filename — that's
        # what xcodebuild's PROVISIONING_PROFILE_SPECIFIER resolves against.
        PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
        mkdir -p "$PP_DIR"

        install_profile() {
          local var_name="$1" label="$2"
          local payload
          payload=$(eval "printf '%s' \"\$$var_name\"")
          if [ -z "$payload" ]; then
            echo "❌ $var_name is empty — corresponding GitHub secret missing"
            return 1
          fi
          local tmp uuid
          tmp=$(mktemp)
          printf '%s' "$payload" | base64 --decode > "$tmp"
          uuid=$(security cms -D -i "$tmp" 2>/dev/null | python3 -c "import sys,plistlib; print(plistlib.loads(sys.stdin.buffer.read())['UUID'])")
          if [ -z "$uuid" ]; then
            echo "❌ Could not extract UUID from $label profile"
            return 1
          fi
          mv "$tmp" "$PP_DIR/$uuid.provisionprofile"
          echo "  ✓ $label profile installed: $uuid.provisionprofile"
        }

        install_profile PROFILE_HOST_BASE64       "Host"
        install_profile PROFILE_SHARE_BASE64      "Share Extension"
        install_profile PROFILE_FINDERSYNC_BASE64 "FinderSync Extension"

    - name: Build and Package
      env:
        CODESIGN_IDENTITY: "Developer ID Application: high5 ventures GmbH (VG5X6JCLGF)"
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Notarize App
      env:
        APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
      run: |
        # Write the API key to a file notarytool can read
        mkdir -p ~/.private_keys
        KEY_FILE=~/.private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
        echo "$APPSTORE_PRIVATE_KEY" > "$KEY_FILE"
        trap 'rm -f Clawsy-notarize.zip "$KEY_FILE"' EXIT

        # Create a zip for notarization (-y preserves framework symlinks)
        cd .build/app && zip -yr ../../Clawsy-notarize.zip Clawsy.app && cd ../..

        KEY_ARGS="--key $KEY_FILE --key-id $APPSTORE_KEY_ID --issuer $APPSTORE_ISSUER_ID"

        # Async submit — get a submission ID we can poll independently
        set -o pipefail
        xcrun notarytool submit Clawsy-notarize.zip $KEY_ARGS --output-format json \
          | tee /tmp/notary-submit.json
        SUB_ID=$(python3 -c "import json,sys; print(json.load(open('/tmp/notary-submit.json')).get('id',''))")
        if [ -z "$SUB_ID" ]; then
          echo "❌ Submission failed — no submission ID returned"
          exit 1
        fi
        echo "Submission ID: $SUB_ID"

        # Poll for up to 90 minutes (Apple usually < 5 min, can spike to 30+)
        STATUS=""
        DEADLINE=$(( $(date +%s) + 5400 ))
        while [ "$(date +%s)" -lt "$DEADLINE" ]; do
          INFO=$(xcrun notarytool info "$SUB_ID" $KEY_ARGS --output-format json 2>&1)
          STATUS=$(echo "$INFO" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
          echo "[$(date -u +%H:%M:%S)] notarization status: $STATUS"
          case "$STATUS" in
            Accepted|Invalid|Rejected) break ;;
          esac
          sleep 30
        done

        # On Invalid/Rejected, dump Apple's developer log before failing
        if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
          echo "❌ Notarization $STATUS — Apple developer log:"
          xcrun notarytool log "$SUB_ID" $KEY_ARGS notary-log.json || true
          cat notary-log.json || true
          exit 1
        fi

        # Anything other than Accepted = fail
        if [ "$STATUS" != "Accepted" ]; then
          echo "❌ Notarization did not complete in 90 min — final status: '$STATUS'"
          echo "Submission ID for manual follow-up: $SUB_ID"
          exit 1
        fi

        # Staple ticket into the app bundle so Gatekeeper works offline
        xcrun stapler staple .build/app/Clawsy.app

        # Verify Gatekeeper acceptance
        spctl -a -vvv -t execute .build/app/Clawsy.app

    - name: Zip App
      run: |
        cp CLAWSY.md .build/app/CLAWSY.md
        cd .build/app
        zip -yr ../../Clawsy.app.zip Clawsy.app CLAWSY.md

    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: Clawsy
        path: Clawsy.app.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Clawsy.app.zip
        generate_release_notes: true
        draft: false
        prerelease: false
