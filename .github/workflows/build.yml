name: Build Clawsy Ecosystem

on:
  push:
    branches: [ "main", "develop", "v1.0" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS Ecosystem
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    # Inject Version if Tagged
    - name: Set Version from Tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/v}
        echo "Setting version to $TAG_NAME"
        
        # Update Info.plist for ClawsyMac (Repo Root)
        /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG_NAME" Info.plist
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" Info.plist
        
        # Update Info.plist for ClawsyMacShare (if needed)
        if [ -f Sources/ClawsyMacShare/Info.plist ]; then
           /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG_NAME" Sources/ClawsyMacShare/Info.plist
           /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" Sources/ClawsyMacShare/Info.plist
        fi

    - name: Build and Package
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Zip App
      run: |
        cp CLAWSY.md .build/app/CLAWSY.md
        cd .build/app
        zip -r ../../Clawsy.app.zip Clawsy.app CLAWSY.md

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Clawsy-Ecosystem
        path: Clawsy.app.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Clawsy.app.zip
        generate_release_notes: true
        draft: false
        prerelease: false
