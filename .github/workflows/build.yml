name: Build Clawsy

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    # Inject Version if Tagged
    - name: Set Version from Tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/v}
        echo "Setting version to $TAG_NAME"

        # Update Info.plist for ClawsyMac
        /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG_NAME" Info.plist
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" Info.plist

        # Update Info.plist for extensions
        for plist in Sources/ClawsyMacShare/Info.plist Sources/ClawsyFinderSync/Info.plist; do
          if [ -f "$plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG_NAME" "$plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" "$plist"
          fi
        done

    - name: Create Signing Certificate
      run: |
        CERT_NAME="Clawsy Development"
        KEYCHAIN="build.keychain"
        KEYCHAIN_PW="build"

        # Create self-signed code signing certificate via openssl config
        cat > /tmp/cert.conf << 'CONF'
        [req]
        distinguished_name = req_dn
        x509_extensions = v3_code
        prompt = no
        [req_dn]
        CN = Clawsy Development
        O = Clawsy
        OU = CLAWSY0001
        [v3_code]
        keyUsage = digitalSignature
        extendedKeyUsage = codeSigning
        CONF

        openssl req -x509 -newkey rsa:2048 \
          -keyout /tmp/key.pem -out /tmp/cert.pem \
          -days 365 -nodes -config /tmp/cert.conf

        openssl pkcs12 -export \
          -out /tmp/clawsy-dev.p12 \
          -inkey /tmp/key.pem -in /tmp/cert.pem \
          -passout pass:$KEYCHAIN_PW

        # Create build keychain and import certificate
        security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
        security default-keychain -s "$KEYCHAIN"
        security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
        security set-keychain-settings -t 3600 "$KEYCHAIN"

        security import /tmp/clawsy-dev.p12 -k "$KEYCHAIN" \
          -P "$KEYCHAIN_PW" -T /usr/bin/codesign -T /usr/bin/security

        security set-key-partition-list -S apple-tool:,apple: \
          -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

        # Add to search list so codesign can find it
        security list-keychains -s "$KEYCHAIN" $(security list-keychains | tr -d '"')

        # Verify
        security find-identity -v -p codesigning "$KEYCHAIN"

        # Cleanup temp files
        rm -f /tmp/key.pem /tmp/cert.pem /tmp/clawsy-dev.p12 /tmp/cert.conf

    - name: Build and Package
      env:
        CODESIGN_IDENTITY: "Clawsy Development"
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Zip App
      run: |
        cp CLAWSY.md .build/app/CLAWSY.md
        cd .build/app
        zip -r ../../Clawsy.app.zip Clawsy.app CLAWSY.md

    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: Clawsy
        path: Clawsy.app.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Clawsy.app.zip
        generate_release_notes: true
        draft: false
        prerelease: false
