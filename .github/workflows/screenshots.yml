name: Update Screenshots

on:
  workflow_run:
    workflows: ["Build Clawsy Ecosystem"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: macos-15
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & run ScreenshotCLI
        run: |
          swift build --product ScreenshotCLI -c release
          mkdir -p docs/screenshots
          swift run --skip-build -c release ScreenshotCLI docs/screenshots

      - name: Commit screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "docs: auto-update screenshots [skip ci]"
            git pull --rebase
            git push
          fi
