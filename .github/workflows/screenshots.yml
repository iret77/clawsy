name: Update Screenshots

on:
  workflow_run:
    workflows: ["Build Clawsy Ecosystem"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-15
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & run ScreenshotCLI
        run: |
          swift build --target ScreenshotCLI -c release
          BINARY=$(find .build -name ScreenshotCLI -type f | head -1)
          echo "Binary found at: $BINARY"
          mkdir -p docs/screenshots
          "$BINARY" docs/screenshots

      - name: Commit screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "docs: auto-update screenshots [skip ci]"
            git push
          fi
