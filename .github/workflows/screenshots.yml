name: Update Screenshots

on:
  workflow_run:
    workflows: ["Build Clawsy Ecosystem"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-15
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & run ScreenshotCLI
        run: |
          swift build --target ScreenshotCLI -c release
          echo "=== .build/release contents ==="
          ls .build/release/ 2>/dev/null || echo "(no .build/release)"
          echo "=== find ScreenshotCLI ==="
          find .build -name "ScreenshotCLI" 2>/dev/null || echo "(not found)"
          BINARY=$(find .build -name "ScreenshotCLI" | head -1)
          echo "Binary: $BINARY"
          mkdir -p docs/screenshots
          "$BINARY" docs/screenshots

      - name: Commit screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "docs: auto-update screenshots [skip ci]"
            git push
          fi
