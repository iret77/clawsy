name: Update Screenshots

on:
  workflow_run:
    workflows: ["Build Clawsy Ecosystem"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-15
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with SCREENSHOT_MODE flag
        run: |
          swift build \
            --target ClawsyMac \
            -Xswiftc -DSCREENSHOT_MODE \
            2>&1

      - name: Run screenshot mode
        run: |
          mkdir -p docs/screenshots
          .build/debug/ClawsyMac --screenshot

      - name: Validate screenshots (no broken string keys)
        run: |
          brew install tesseract 2>/dev/null || true
          FAILED=0
          for f in docs/screenshots/*.png; do
            TEXT=$(tesseract "$f" stdout 2>/dev/null || true)
            # Broken strings look like ALL_CAPS_WITH_UNDERSCORES
            BROKEN=$(echo "$TEXT" | grep -oE '\b[A-Z]{2,}(_[A-Z]+){2,}\b' | head -5)
            if [ -n "$BROKEN" ]; then
              echo "❌ Broken strings in $f: $BROKEN"
              FAILED=1
            else
              echo "✅ $f looks good"
            fi
          done
          [ $FAILED -eq 0 ] || exit 1

      - name: Commit screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes."
          else
            git commit -m "docs: auto-update screenshots [skip ci]"
            git push
          fi
